name: Quirk CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: quirkimsacr
  ACR_LOGIN_SERVER: quirkimsacr.azurecr.io
  AKS_CLUSTER: quirk-aks
  AKS_RESOURCE_GROUP: TaskFlow-RG

jobs:
  # ── Validate (runs on every PR and push) ───────────────────────────────────
  # Enforces the SRS §8 pre-merge gates so broken code can't reach the build/deploy
  # stages: backend syntax check, Prisma schema validation, and a frontend build.
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Backend — install, syntax check & Prisma validate
        run: |
          cd backend
          npm install
          find . -path ./node_modules -prune -o -name '*.js' -print | xargs -r -n1 node --check
          npx prisma validate

      - name: Frontend — install & build
        run: |
          cd frontend
          npm install
          npm run build

  # ── Build & Push Docker Images ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: validate
    # Only build on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      # Apply the schema additively. --accept-data-loss is intentionally NOT used:
      # a divergence that would drop a column/table fails the deploy loudly instead
      # of silently destroying production data. Demo seeding is a one-time setup task
      # and is deliberately not run on every deploy (it would pollute/duplicate prod
      # data); seed manually with `npm run seed:demo` against a fresh database only.
      - name: Push Prisma DB Schema to Azure Postgres
        run: |
          cd backend
          npm install
          npx prisma generate
          npx prisma db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build & push quirk-backend image
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/quirk-backend:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/quirk-backend:latest \
            ./backend
          docker push ${{ env.ACR_LOGIN_SERVER }}/quirk-backend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/quirk-backend:latest

      - name: Build & push quirk-frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/quirk-frontend:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/quirk-frontend:latest \
            ./frontend
          docker push ${{ env.ACR_LOGIN_SERVER }}/quirk-frontend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/quirk-frontend:latest

  # ── Deploy to AKS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS kubectl context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Pin image tags to this commit SHA
        run: |
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      # Sync AI provider keys from GitHub secrets into the existing AKS secret.
      # Values are passed via env (never interpolated into the logged command).
      # GEMINI_API_KEY is required and fails the deploy loudly if missing — otherwise
      # the assistant silently boots "not configured". GROQ_API_KEY is the optional
      # fallback provider and is synced only when present. A char count (not the
      # value) is printed so a successful sync is verifiable in the run log.
      - name: Sync AI provider secrets into AKS
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY repository secret is empty or unset — the AI assistant will not work."
            exit 1
          fi
          kubectl patch secret quirk-secrets -n quirk --type merge \
            -p "{\"stringData\":{\"GEMINI_API_KEY\":\"$GEMINI_API_KEY\"}}"
          if [ -n "$GROQ_API_KEY" ]; then
            kubectl patch secret quirk-secrets -n quirk --type merge \
              -p "{\"stringData\":{\"GROQ_API_KEY\":\"$GROQ_API_KEY\"}}"
            echo "GROQ_API_KEY synced (fallback provider enabled)"
          else
            echo "GROQ_API_KEY not set — fallback provider disabled (Gemini only)"
          fi
          echo "GEMINI_API_KEY synced ($(kubectl get secret quirk-secrets -n quirk -o jsonpath='{.data.GEMINI_API_KEY}' | base64 -d | wc -c) chars)"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/issuer.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/quirk-backend -n quirk --timeout=120s
          kubectl rollout status deployment/quirk-frontend -n quirk --timeout=120s

      - name: Show running pods
        run: kubectl get pods -n quirk
