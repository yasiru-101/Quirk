name: Reset Azure Database

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET to wipe and reseed the Azure Postgres database'
        required: true
        type: string

jobs:
  reset:
    name: Force reset and seed database
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'RESET'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reset schema and seed platform admin
        run: |
          cd backend
          npm install
          npx prisma generate
          npx prisma db push --force-reset
          npm run seed:admin
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
