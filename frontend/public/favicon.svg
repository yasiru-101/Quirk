<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="qg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="qg2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Outer Q ring -->
  <circle cx="22" cy="21" r="13" stroke="url(#qg)" stroke-width="5.5" fill="none"/>

  <!-- Q tail — bold diagonal stroke extending bottom-right -->
  <line x1="31" y1="30" x2="44" y2="44" stroke="url(#qg2)" stroke-width="6" stroke-linecap="round"/>

  <!-- Inner cut — makes it look like a Q not an O -->
  <line x1="26" y1="26" x2="36" y2="36" stroke="url(#qg)" stroke-width="3.5" stroke-linecap="round"/>
</svg>