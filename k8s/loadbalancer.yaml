apiVersion: v1
kind: Service
metadata:
  name: quirk-loadbalancer
  namespace: quirk
  labels:
    app: quirk
spec:
  # LoadBalancer provisions an Azure public IP automatically
  type: LoadBalancer
  selector:
    app: quirk-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
