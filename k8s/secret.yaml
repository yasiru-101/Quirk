# ─────────────────────────────────────────────────────────────────────────────
# Quirk — Kubernetes Secret Template
# ─────────────────────────────────────────────────────────────────────────────
# !! DO NOT COMMIT REAL VALUES !!
# This file is a template only. Create the real secret directly in AKS using:
#
#   kubectl create secret generic quirk-secrets \
#     --from-literal=DATABASE_URL="postgresql://<username>:<password>@<host>:5432/<database>?sslmode=require" \
#     --from-literal=JWT_SECRET="<generate: node -e \"console.log(require('crypto').randomBytes(48).toString('base64'))\">" \
#     --from-literal=JWT_REFRESH_SECRET="<generate: same as above>" \
#     --from-literal=AZURE_BLOB_CONNECTION_STRING="<from Azure Portal>" \
#     --from-literal=AZURE_ACS_CONNECTION_STRING="<from Azure Portal>" \
#     --from-literal=AZURE_ACS_SENDER_ADDRESS="<your verified sender>" \
#     --from-literal=GEMINI_API_KEY="<from Google AI Studio>" \
#     --from-literal=GROQ_API_KEY="<optional fallback, from console.groq.com>" \
#     -n quirk
#
# ─────────────────────────────────────────────────────────────────────────────
# NEVER apply this file directly to the cluster.
# The secret is created imperatively (kubectl create secret) so real values
# never appear in version-controlled YAML files.
